<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D Initiative Tracker</title>

<!-- Immediately apply theme to prevent flash -->
<script>
(function(){
    const theme = localStorage.getItem("theme");
    if(theme === "dark"){
        document.documentElement.classList.add("dark");
    }
})();
</script>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<style>
/* Glow effect for current turn */
.turnGlow {
    outline: 3px solid rgba(34,197,94,0.9);
    outline-offset: -2px;
    animation: pulseGlow 1.2s infinite alternate;
}
@keyframes pulseGlow {
    from { outline-color: rgba(34,197,94,0.6); }
    to { outline-color: rgba(34,197,94,1); }
}
.circle {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid black;
    display: inline-block;
    cursor: pointer;
    background: white;
}
.dark .circle { background: #1e293b; border-color: #94a3b8; }
.circle.filled { background: black; }
.dark .circle.filled { background: #e5e7eb; }
.resourceRow { display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap; text-align: center; margin-bottom: 2px; }
</style>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-200 min-h-screen flex flex-col items-center py-10 transition-colors duration-300">

<h1 class="text-3xl font-bold mb-4">🎲 Initiative Tracker</h1>

<div id="roomUI" class="flex flex-wrap gap-2 items-center justify-center mb-6">
<input id="roomInput" placeholder="Room Code" class="border rounded px-2 py-1 text-center text-sm bg-white dark:bg-slate-700 dark:border-slate-600">
<button onclick="joinRoom()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded shadow">Join</button>
<button onclick="createRoom()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded shadow">Create Room</button>
<button onclick="copyInvite()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded shadow">Copy Invite</button>
<span id="roomDisplay" class="text-sm font-semibold ml-2"></span>
</div>

<div class="text-lg font-semibold mb-6">Round: <span id="round">1</span></div>

<div class="flex gap-3 mb-6 flex-wrap justify-center">
<button onclick="addCombatant()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded shadow">Add</button>
<button onclick="rollInitiative()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-1 rounded shadow">Roll</button>
<button onclick="sortInitiative()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded shadow">Sort</button>
<button onclick="nextTurn()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded shadow">Next (Space)</button>
<button onclick="resetEncounter()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded shadow">Reset</button>
<button onclick="clearEncounter()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow">Clear</button>
</div>

<div class="w-full max-w-7xl mx-auto px-2">
<table class="w-full shadow rounded text-xs table-fixed bg-white dark:bg-slate-800 transition-colors">
<thead class="bg-slate-200 dark:bg-slate-700 text-center">
<tr>
<th class="p-1 w-6"></th>
<th class="p-1 w-14">Init</th>
<th class="p-1 w-36">Name</th>
<th class="p-1 w-16">HP</th>
<th class="p-1 w-14">AC</th>
<th class="p-1 w-44">Resources</th>
<th class="p-1 w-32">Conditions</th>
<th class="p-1 w-40">Notes</th>
<th class="p-1 w-12">Color</th>
<th class="p-1 w-16"></th>
</tr>
</thead>
<tbody id="combat-table"></tbody>
</table>
</div>

<div class="flex justify-center pt-2">
<button onclick="goToMenu()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">Back to Menu</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ---------- FIREBASE CONFIG ----------
const firebaseConfig = {
  apiKey: "AIzaSyC5jxaY22pAMuiq8uWlv-NOPmswbIQzdfs",
  authDomain: "dndhost.firebaseapp.com",
  projectId: "dndhost",
  storageBucket: "dndhost.firebasestorage.app",
  messagingSenderId: "944013171333",
  appId: "1:944013171333:web:6bb9c9ce2c9a18cbde27ec",
  measurementId: "G-66P012KFNH"
};

const app = initializeApp(firebaseConfig);
const firebaseDB = getFirestore(app);

// ---------- GLOBAL STATE ----------
let roomId = new URLSearchParams(window.location.search).get("room");
let hostId = null;
let userId = crypto.randomUUID();
let isHost = false;
let combatants = [];
let currentTurn = 0;
let round = 1;
const CONDITIONS = ["Blinded","Charmed","Deafened","Frightened","Grappled","Incapacitated","Invisible","Paralyzed","Petrified","Poisoned","Prone","Restrained","Stunned","Unconscious","Concentrating"];

// ---------- ROOM FUNCTIONS ----------
async function createRoom() {
    roomId = Math.random().toString(36).substring(2,7).toUpperCase();
    await setDoc(doc(firebaseDB, "rooms", roomId), { round:1, currentTurn:0, hostId: userId });
    isHost = true; hostId = userId;
    document.getElementById("roomDisplay").innerText = "Room: " + roomId + " (Host)";
    loadState();
}
async function joinRoom() {
    const code = document.getElementById("roomInput").value.trim().toUpperCase();
    if(!code) return;
    roomId = code;
    document.getElementById("roomDisplay").innerText = "Room: " + roomId;
    loadState();
}
function copyInvite() {
    const url = window.location.origin + window.location.pathname + "?room=" + roomId;
    navigator.clipboard.writeText(url);
    alert("Invite link copied!");
}
window.createRoom = createRoom;
window.joinRoom = joinRoom;
window.copyInvite = copyInvite;

// ---------- STATE LISTENERS ----------
function loadState() {
    if(!roomId) return;
    onSnapshot(doc(firebaseDB,"rooms",roomId), snapshot => {
        if(!snapshot.exists()) return;
        const data = snapshot.data();
        currentTurn = data.currentTurn || 0;
        round = data.round || 1;
        render();
    });
    onSnapshot(collection(firebaseDB,"rooms",roomId,"combatants"), snapshot => {
        combatants = [];
        snapshot.forEach(doc => combatants.push({id:doc.id, ...doc.data()}));
        render();
    });
}

// ---------- HOST / COMBATANT FUNCTIONS ----------
async function addCombatant() {
    if(!isHost) { alert("Only host can add combatants"); return; }
    await addDoc(collection(firebaseDB, "rooms", roomId, "combatants"), { name:"Combatant", init:"", hp:"", ac:"", notes:"", color:"#e5e7eb", conditions:[], resources:[], locked:false, hiddenFields:[] });
}
window.addCombatant = addCombatant;

// ---------- UI / RENDER ----------
function render() {
    const table = document.getElementById("combat-table");
    table.innerHTML = "";
    document.getElementById("round").innerText = round;
    combatants.forEach((c,index)=>{
        const row = document.createElement("tr");
        row.dataset.id = c.id;
        row.style.backgroundColor = c.color;
        row.draggable = true;
        if(index===currentTurn) row.classList.add("turnGlow");
        row.innerHTML = `
<td class="text-center font-bold">${index===currentTurn?"➤":""}</td>
<td class="text-center"><input type="number" value="${c.init}" class="w-12 border rounded text-center" oninput=""></td>
<td class="text-center"><input value="${c.name}" class="border rounded w-32 text-center" oninput=""></td>
<td class="text-center"><input value="${c.hp}" class="border rounded w-14 text-center" oninput=""></td>
<td class="text-center"><input value="${c.ac}" class="border rounded w-12 text-center" oninput=""></td>
<td>Resources</td>
<td>Conditions</td>
<td><textarea>${c.notes}</textarea></td>
<td><input type="color" value="${c.color}"></td>
<td></td>
`;
        table.appendChild(row);
    });
}

// ---------- INITIALIZATION ----------
window.addEventListener("DOMContentLoaded", () => {
    if(!roomId){
        document.getElementById("roomDisplay").innerText = "No room joined";
    } else {
        document.getElementById("roomDisplay").innerText = "Room: " + roomId;
        loadState();
    }
});
</script>

<button onclick="toggleDarkMode()" class="fixed bottom-5 right-5 px-3 py-2 rounded-lg shadow bg-gray-800 text-white dark:bg-gray-700 z-50">🌙</button>
<script>
function toggleDarkMode(){
    const root = document.documentElement;
    if(root.classList.contains("dark")){
        root.classList.remove("dark");
        localStorage.setItem("theme","light");
    } else {
        root.classList.add("dark");
        localStorage.setItem("theme","dark");
    }
}
function goToMenu(){ window.location.href = "."; }
</script>

</body>
</html>
