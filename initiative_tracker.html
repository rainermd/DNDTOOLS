<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D Initiative Tracker</title>

<!-- Immediately apply theme to prevent flash -->
<script>
(function(){
    const theme = localStorage.getItem("theme");
    if(theme === "dark"){
        document.documentElement.classList.add("dark");
    }
})();
</script>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<!-- Custom Styles -->
<style>
/* Glow effect for current turn */
.turnGlow {
    outline: 3px solid rgba(34,197,94,0.9);
    outline-offset: -2px;
    animation: pulseGlow 1.2s infinite alternate;
}

@keyframes pulseGlow {
    from { outline-color: rgba(34,197,94,0.6); }
    to { outline-color: rgba(34,197,94,1); }
}

/* Circles for resources or indicators */
.circle {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid black;
    display: inline-block;
    cursor: pointer;
    background: white;
}

.dark .circle {
    background: #1e293b;
    border-color: #94a3b8;
}

.circle.filled {
    background: black;
}

.dark .circle.filled {
    background: #e5e7eb;
}

/* Row of resources or stats */
.resourceRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    text-align: center;
    margin-bottom: 2px;
}
</style>

</head>


<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-200 min-h-screen flex flex-col items-center py-10 transition-colors duration-300">
<!-- WEBSITE VERSION + BUG REPORT -->
<div class="fixed bottom-2 left-2 flex items-center gap-2 px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded shadow text-xs select-none z-50">
    <span>Version 1.0.1-beta</span>
    <span>|</span>
    <a id="bugReportLink"
       href="#"
       class="flex items-center gap-1 underline hover:text-blue-500">
        🐞 Submit a bug report
    </a>
</div>

<script>
document.getElementById("bugReportLink").addEventListener("click", function() {
    const version = "1.0.0-beta";
    const page = window.location.href;

    const subject = encodeURIComponent("D&D Simulator Bug Report");
    const body = encodeURIComponent(
        `Version: ${version}
Page: ${page}

Describe the bug:
-----------------

Steps to reproduce:
-----------------

Expected result:
-----------------

Actual result:
-----------------
`
    );

    window.location.href = `mailto:my.email@gmail.com?subject=${subject}&body=${body}`;
});
</script>
<h1 class="text-3xl font-bold mb-4">🎲 Initiative Tracker</h1>
<div id="roomUI" class="flex flex-wrap gap-2 items-center justify-center mb-6">

<input id="roomInput"
placeholder="Room Code"
class="border rounded px-2 py-1 text-center text-sm bg-white dark:bg-slate-700 dark:border-slate-600">

<button onclick="joinRoom()"
class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded shadow">
Join
</button>

<button onclick="createRoom()"
class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded shadow">
Create Room
</button>

<button onclick="copyInvite()"
class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded shadow">
Copy Invite
</button>

<span id="roomDisplay" class="text-sm font-semibold ml-2"></span>

</div>
<div class="text-lg font-semibold mb-6">
Round: <span id="round">1</span>
</div>

<div class="flex gap-3 mb-6 flex-wrap justify-center">

<button onclick="addCombatant()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded shadow">
Add
</button>

<button onclick="rollInitiative()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-1 rounded shadow">
Roll
</button>

<button onclick="sortInitiative()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded shadow">
Sort
</button>

<button onclick="nextTurn()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded shadow">
Next (Space)
</button>

<button onclick="resetEncounter()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded shadow">
Reset
</button>

<button onclick="clearEncounter()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow">
Clear
</button>

</div>

<div class="w-full max-w-7xl mx-auto px-2">

<table class="w-full shadow rounded text-xs table-fixed bg-white dark:bg-slate-800 transition-colors">

<thead class="bg-slate-200 dark:bg-slate-700 text-center">
<tr>
<th class="p-1 w-6"></th>
<th class="p-1 w-14">Init</th>
<th class="p-1 w-36">Name</th>
<th class="p-1 w-16">HP</th>
<th class="p-1 w-14">AC</th>
<th class="p-1 w-44">Resources</th>
<th class="p-1 w-32">Conditions</th>
<th class="p-1 w-40">Notes</th>
<th class="p-1 w-12">Color</th>
<th class="p-1 w-16"></th>
</tr>
</thead>

<tbody id="combat-table"></tbody>

</table>

</div>

<div class="flex justify-center pt-2">
<button onclick="goToMenu()"
class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">
Back to Menu
</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzyd45tk1oAhnRmpBZ894aCdk3lUakqkY",
  authDomain: "dndhost.firebaseapp.com",
  projectId: "dndhost",
  storageBucket: "dndhost.firebasestorage.app",
  messagingSenderId: "944013171333",
  appId: "1:944013171333:web:6bb9c9ce2c9a18cbde27ec",
  measurementId: "G-66P012KFNH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.firebaseDB = db
window.firebaseDoc = doc
window.firebaseSetDoc = setDoc
window.firebaseOnSnapshot = onSnapshot

</script>

<script>

// --- Client ID and Host Tracking ---
let clientId = localStorage.getItem("clientId");
if (!clientId) {
    clientId = Date.now() + "-" + Math.random().toString(36).substring(2,7);
    localStorage.setItem("clientId", clientId);
}

let isHost = false; // will be true if this user created the room

let roomId = new URLSearchParams(window.location.search).get("room")

function generateRoom(){
return Math.random().toString(36).substring(2,7).toUpperCase()
}

function createRoom() {
    roomId = generateRoom();

    // Save locally immediately
    localStorage.setItem("hostRoom-" + roomId, clientId);
    isHost = true; // You are the host

    firebaseSetDoc(firebaseDoc(firebaseDB, "rooms", roomId), {
        hostId: clientId,     // Host stored in Firestore
        combatants: [],
        currentTurn: 0,
        round: 1,
        lastUpdated: Date.now()
    }).then(() => {
        // Redirect with room code
        window.location.search = "?room=" + roomId;
    });
}


function joinRoom(){

const code = document.getElementById("roomInput").value.trim().toUpperCase()

if(!code) return

window.location.search = "?room=" + code

}

function copyInvite(){

const url = window.location.origin + window.location.pathname + "?room=" + roomId

navigator.clipboard.writeText(url)

alert("Invite link copied!")

}

if(!roomId){

document.getElementById("roomDisplay").innerText = "No room joined"

}else{

document.getElementById("roomDisplay").innerText = "Room: " + roomId

}

let combatants=[]
let currentTurn=0
let round=1
let dragId=null

const CONDITIONS=[
"Blinded","Charmed","Deafened","Frightened","Grappled","Incapacitated",
"Invisible","Paralyzed","Petrified","Poisoned","Prone","Restrained",
"Stunned","Unconscious","Concentrating"
]


function loadState() {
    if (!roomId) return;
    const roomRef = firebaseDoc(firebaseDB, "rooms", roomId);

    firebaseOnSnapshot(roomRef, (snapshot) => {
        if (!snapshot.exists()) {
            // Create empty room if somehow missing
            if (isHost) saveState(); 
            return;
        }

        const data = snapshot.data();

        // ✅ Determine host robustly
        const savedHostId = localStorage.getItem("hostRoom-" + roomId);

        if (data.hostId) {
            isHost = savedHostId === data.hostId;
        } else if (savedHostId) {
            // Fallback if Firestore hasn’t written yet
            isHost = true;
            // Write hostId to Firestore
            firebaseSetDoc(firebaseDoc(firebaseDB, "rooms", roomId), {
                hostId: savedHostId
            }, { merge: true });
        } else {
            isHost = false;
        }

        document.getElementById("roomDisplay").innerText =
            `Room: ${roomId}` + (isHost ? " (Host)" : "");

        combatants = data.combatants || [];
        currentTurn = data.currentTurn || 0;
        round = data.round || 1;

        render();
    });
}

async function saveState(){

if(!roomId) return

await firebaseSetDoc(
firebaseDoc(firebaseDB,"rooms",roomId),
{
combatants,
currentTurn,
round,
lastUpdated: Date.now()
},
{ merge: true }
)

}

function addCombatant(){
    // When adding a combatant
combatants.push({
    id: Date.now(),
    init: "",
    name: "Combatant",
    hp: "",
    ac: "",
    notes: "",
    color: document.documentElement.classList.contains("dark") ? "#334155" : "#e5e7eb",
    conditions: [],
    resources: [],
    locked: false,
    hide: { name:false, hp:false, ac:false, notes:false, resources:false } // NEW
});
    saveState();
    render();
}

function duplicateCombatant(id){

const index=combatants.findIndex(c=>c.id===id)
const copy=JSON.parse(JSON.stringify(combatants[index]))
copy.id=Date.now()

combatants.splice(index+1,0,copy)

saveState()
render()
}

function removeCombatant(id){
combatants=combatants.filter(c=>c.id!==id)
saveState()
render()
}

function createResource(id){

const name=document.getElementById("resName_"+id).value
const amount=parseInt(document.getElementById("resCount_"+id).value)

if(!name || !amount) return

const c=combatants.find(c=>c.id===id)

c.resources.push({
name,
max:amount,
used:Array(amount).fill(false)
})

saveState()
render()
}

function deleteResource(cid,rid){
const c=combatants.find(c=>c.id===cid)
c.resources.splice(rid,1)
saveState()
render()
}

function toggleCircle(cid,rid,index){
const c=combatants.find(c=>c.id===cid)
c.resources[rid].used[index]=!c.resources[rid].used[index]
saveState()
render()
}
// Toggle lock (host only)
function toggleLock(id){
    if (!isHost) return;
    const c = combatants.find(c => c.id === id);
    c.locked = !c.locked;
    saveState();
    render();
}

// Toggle fog of war (host only)
function toggleFog(id){
    if (!isHost) return;
    const c = combatants.find(c => c.id === id);
    c.fogOfWar = !c.fogOfWar;
    saveState();
    render();
}

function addCondition(id,condition){

if(!condition) return
const c=combatants.find(c=>c.id===id)

if(!c.conditions.includes(condition)){
c.conditions.push(condition)
}

saveState()
render()
}

function removeCondition(id,condition){
const c=combatants.find(c=>c.id===id)
c.conditions=c.conditions.filter(x=>x!==condition)
saveState()
render()
}

let saveTimer = null;
function saveStateDebounced(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveState, 200); // update max 5x/sec
}

function update(id,key,value){
    const c = combatants.find(c=>c.id===id);
    if(key==="init"||key==="hp"||key==="ac"){
        c[key] = value===""?"":parseInt(value);
    }else{
        c[key] = value;
    }
    saveStateDebounced();
}

function updateColor(id,value,input){
const c=combatants.find(c=>c.id===id)
c.color=value
input.closest("tr").style.backgroundColor=value
saveState()
}

function dragStart(e){
dragId=e.currentTarget.dataset.id
}

function dragOver(e){
e.preventDefault()
}

function dropRow(e){

e.preventDefault()

const targetId=e.currentTarget.dataset.id

const from=combatants.findIndex(c=>c.id==dragId)
const to=combatants.findIndex(c=>c.id==targetId)

const moved=combatants.splice(from,1)[0]
combatants.splice(to,0,moved)

saveState()
render()
}

function render() {

    const table = document.getElementById("combat-table");
    table.innerHTML = "";

    document.getElementById("round").innerText = round;

    combatants.forEach((c, index) => {

        const row = document.createElement("tr");

        row.dataset.id = c.id;
        row.style.backgroundColor = c.color;
        row.draggable = true;

        row.ondragstart = dragStart;
        row.ondragover = dragOver;
        row.ondrop = dropRow;

        if (index === currentTurn) {
            row.classList.add("turnGlow");
        }

        // --- Display values with per-field hide/fog-of-war ---
        const displayInit   = (!isHost && c.hide?.init) ? "??" : c.init;
        const displayName   = (!isHost && c.hide?.name) ? "??" : c.name;
        const displayHP     = (!isHost && c.hide?.hp) ? "??" : c.hp;
        const displayAC     = (!isHost && c.hide?.ac) ? "??" : c.ac;
        const resourcesHidden = (!isHost && c.hide?.resources);

        const notesDisabled = !isHost && c.locked ? "disabled" : "";
        const displayNotes  = getNotes(c.id);

        row.innerHTML = `
<td class="text-center font-bold">${index === currentTurn ? "➤" : ""}</td>

<td class="text-center">
<input type="number" value="${displayInit}" class="w-12 border rounded text-center bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()"
oninput="${(!isHost && c.locked) ? '' : `update(${c.id},'init',this.value)`}"
${(!isHost && c.locked) ? 'disabled' : ''}>
${isHost ? `<button onclick="toggleHide(${c.id},'init')">${c.hide.init ? '😎' : '👁️'}</button>` : ''}
</td>

<td class="text-center">
<input value="${displayName}" class="border rounded w-32 text-center bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()"
oninput="${(!isHost && c.locked) ? '' : `update(${c.id},'name',this.value)`}"
${(!isHost && c.locked) ? 'disabled' : ''}>
${isHost ? `<button onclick="toggleHide(${c.id},'name')">${c.hide.name ? '😎' : '👁️'}</button>` : ''}
</td>

<td class="text-center relative">
<input value="${displayHP}" 
class="border rounded w-14 text-center bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()"
onclick="openHPEdit(${c.id},this)"
oninput="${(!isHost && c.locked) ? '' : `update(${c.id},'hp',this.value)`}"
${(!isHost && c.locked) ? 'disabled' : ''}>
${isHost ? `<button onclick="toggleHide(${c.id},'hp')">${c.hide.hp ? '😎' : '👁️'}</button>` : ''}
</td>

<td class="text-center">
<input value="${displayAC}" class="border rounded w-12 text-center bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()"
oninput="${(!isHost && c.locked) ? '' : `update(${c.id},'ac',this.value)`}"
${(!isHost && c.locked) ? 'disabled' : ''}>
${isHost ? `<button onclick="toggleHide(${c.id},'ac')">${c.hide.ac ? '😎' : '👁️'}</button>` : ''}
</td>

<td class="text-xs">
${!resourcesHidden ? c.resources.map((r, rid) => `
<div class="resourceRow">
<span class="font-semibold">${r.name}</span>
<button onclick="${(!isHost && c.locked) ? '' : `deleteResource(${c.id},${rid})`}"
class="text-red-600 font-bold" ${(!isHost && c.locked) ? 'disabled' : ''}>✖</button>
${r.used.map((u, i) => `
<div onclick="${(!isHost && c.locked) ? '' : `toggleCircle(${c.id},${rid},${i})`}"
class="circle ${u ? "filled" : ""}"></div>
`).join("")}
</div>
`).join("") : "Hidden"}
<div class="flex justify-center gap-1 mt-1">
<input id="resName_${c.id}" placeholder="Res"
class="border rounded text-xs px-1 w-16 bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()" ${(!isHost && c.locked) ? 'disabled' : ''}>
<input id="resCount_${c.id}" type="number" placeholder="#"
class="border rounded text-xs px-1 w-10 bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()" ${(!isHost && c.locked) ? 'disabled' : ''}>
<button onclick="${(!isHost && c.locked) ? '' : `createResource(${c.id})`}"
class="bg-gray-300 dark:bg-slate-600 px-1 rounded text-xs" ${(!isHost && c.locked) ? 'disabled' : ''}>+</button>
${isHost ? `<button onclick="toggleHide(${c.id},'resources')">${c.hide.resources ? '😎' : '👁️'}</button>` : ''}
</div>
</td>

<td class="text-center">
<div class="flex flex-wrap gap-1 justify-center">
${c.conditions.map(cond => `
<span class="bg-blue-200 dark:bg-blue-700 px-1 rounded text-[10px]">
${cond}
<button onclick="${(!isHost && c.locked) ? '' : `removeCondition(${c.id},'${cond}')`}" ${(!isHost && c.locked) ? 'disabled' : ''}>x</button>
</span>
`).join("")}
</div>
<select class="text-xs bg-white dark:bg-slate-700 dark:border-slate-600"
onchange="${(!isHost && c.locked) ? '' : `addCondition(${c.id},this.value);this.value=''`}" ${(!isHost && c.locked) ? 'disabled' : ''}>
<option value="">+</option>
${CONDITIONS.map(c => `<option>${c}</option>`).join("")}
</select>
</td>

<td class="p-1">
<textarea class="border rounded w-full h-10 p-1 text-xs bg-white dark:bg-slate-700 dark:border-slate-600"
onmousedown="event.stopPropagation()"
oninput="updateNotes(${c.id}, this.value)"
>${displayNotes}</textarea>
${isHost ? `<button onclick="toggleHide(${c.id},'notes')">${c.hide.notes ? '😎' : '👁️'}</button>` : ''}
</td>

<td class="text-center">
<input type="color" value="${c.color}"
onmousedown="event.stopPropagation()"
oninput="${(!isHost && c.locked) ? '' : `updateColor(${c.id},this.value,this)`}" ${(!isHost && c.locked) ? 'disabled' : ''}>
</td>

<td class="text-center space-x-1">
<button onclick="${(!isHost && c.locked) ? '' : `duplicateCombatant(${c.id})`}"
class="bg-green-200 px-1 rounded text-green-800 font-bold" ${(!isHost && c.locked) ? 'disabled' : ''}>✔</button>

<button onclick="${(!isHost && c.locked) ? '' : `removeCombatant(${c.id})`}"
class="bg-red-200 px-1 rounded text-red-800 font-bold" ${(!isHost && c.locked) ? 'disabled' : ''}>✖</button>

${isHost ? `<button onclick="toggleLock(${c.id})" class="bg-gray-300 px-1 rounded text-xs">${c.locked ? '🔒' : '🔓'}</button>` : ''}

${isHost ? `<button onclick="toggleFog(${c.id})" class="bg-gray-300 px-1 rounded text-xs">${c.fogOfWar ? 'Reveal' : 'Hide'}</button>` : ''}

</td>
`;

        table.appendChild(row);

    });

}

function rollInitiative(){
combatants.forEach(c=>{
if(c.init===""){
c.init=Math.floor(Math.random()*20)+1
}
})
saveState()
render()
}

function toggleHide(id, field) {
    if (!isHost) return;
    const c = combatants.find(c => c.id === id);
    c.hide[field] = !c.hide[field];
    saveState();
    render();
}

function sortInitiative(){

combatants.sort((a,b)=>(b.init||0)-(a.init||0))
currentTurn=0
round=1

saveState()
render()
}

function nextTurn(){

if(combatants.length===0)return

currentTurn++

if(currentTurn>=combatants.length){
currentTurn=0
round++
}

saveState()
render()
}

function resetEncounter(){

combatants.forEach(c=>c.init="")

currentTurn=0
round=1

saveState()
render()
}

// --- NOTES LOCAL STORAGE ---
function updateNotes(id, value) {
    const key = `notes-${roomId}-${id}-${clientId}`;
    localStorage.setItem(key, value);
}

function getNotes(id) {
    const key = `notes-${roomId}-${id}-${clientId}`;
    return localStorage.getItem(key) || "";
}

function clearEncounter(){

combatants=[]
currentTurn=0
round=1

saveState()
render()

}

document.addEventListener("keydown",function(e){

if(e.code==="Space" && !["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName)){
e.preventDefault()
nextTurn()
}

})

window.addEventListener("DOMContentLoaded", () => {
    loadState()
})

</script>

<button onclick="toggleDarkMode()"
class="fixed bottom-5 right-5 px-3 py-2 rounded-lg shadow bg-gray-800 text-white dark:bg-gray-700 z-50">
🌙
</button>

<script>
function toggleDarkMode(){

const root=document.documentElement

if(root.classList.contains("dark")){
root.classList.remove("dark")
localStorage.setItem("theme","light")
}else{
root.classList.add("dark")
localStorage.setItem("theme","dark")
}

}
function goToMenu(){
window.location.href="."
}

function openHPEdit(id,input){

event.stopPropagation()

closeHPEdit()

const container=document.createElement("div")

container.id="hpEditor"

container.className="absolute z-50 bg-white dark:bg-slate-800 border dark:border-slate-600 rounded shadow p-2 flex gap-1 items-center"

container.onclick=(e)=>e.stopPropagation()

container.innerHTML=`

<input id="hpAdjustValue" type="number" min="0" value="0"
class="border rounded w-16 text-center bg-white dark:bg-slate-700 dark:border-slate-600">

<button onclick="adjustHP(${id},1)"
class="px-2 bg-green-500 text-white rounded">+</button>

<button onclick="adjustHP(${id},-1)"
class="px-2 bg-red-500 text-white rounded">-</button>

`

document.body.appendChild(container)

const rect=input.getBoundingClientRect()

container.style.left=rect.left+"px"
container.style.top=(rect.bottom+4)+"px"

}

function adjustHP(id,sign){

const val=parseInt(document.getElementById("hpAdjustValue").value)

if(isNaN(val) || val<0) return

const c=combatants.find(c=>c.id===id)

let current=parseInt(c.hp)||0

current += sign * val

c.hp=current

saveState()
render()

}

function closeHPEdit(){

const existing=document.getElementById("hpEditor")

if(existing){
existing.remove()
}

}

document.addEventListener("click",function(e){

const popup=document.getElementById("hpEditor")

if(!popup) return

if(!popup.contains(e.target)){
closeHPEdit()
}

})
</script>

</body>
</html>
