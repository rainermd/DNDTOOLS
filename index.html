<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D&D Simulator Menu</title>

    <!-- Immediately apply saved dark mode to prevent flash -->
    <script>
        (function() {
            const theme = localStorage.getItem("theme");
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind dark mode configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center h-screen font-sans transition-colors duration-300">
<!-- WEBSITE VERSION + BUG REPORT -->
<div class="fixed bottom-2 left-2 flex items-center gap-2 px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded shadow text-xs select-none z-50">
    <span>Version 1.0.0-beta</span>
    <span>|</span>
    <a id="bugReportLink"
       href="#"
       class="flex items-center gap-1 underline hover:text-blue-500">
        🐞 Submit a bug report
    </a>
</div>

<script>
document.getElementById("bugReportLink").addEventListener("click", function() {
    const version = "1.0.0-beta";
    const page = window.location.href;

    const subject = encodeURIComponent("D&D Simulator Bug Report");
    const body = encodeURIComponent(
        `Version: ${version}
Page: ${page}

Describe the bug:
-----------------

Steps to reproduce:
-----------------

Expected result:
-----------------

Actual result:
-----------------
`
    );

    window.location.href = `mailto:my.email@gmail.com?subject=${subject}&body=${body}`;
});
</script>
    <!-- Main Card -->
    <div class="bg-white dark:bg-gray-800 p-10 rounded-xl shadow-lg text-center transition-colors duration-300">
        <h1 class="text-4xl font-bold mb-8 text-gray-800 dark:text-gray-200">D&D Simulator</h1>

    <div class="flex flex-wrap gap-6 justify-center">
    <button onclick="window.location.href='combat.html'"
            class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
        Combat Simulator
    </button>
    <button onclick="window.location.href='dice.html'"
            class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
        Dice Roller
    </button>
    <button onclick="window.location.href='skillcheck.html'"
            class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Skill Check Difficulty
    </button>
    <button onclick="window.location.href='initiative_tracker.html'" 
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg shadow text-lg">
        Initiative Tracker
    </button>  
    <button onclick="window.location.href='npcnames.html'" 
        class="px-6 py-3 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors">
        NPC Name Generator
    </button> 
    <button onclick="window.location.href='domt.html'" 
        class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
        Deck of Many Things
    </button>     
    <button onclick="window.location.href='wildmagic.html'" 
        class="px-6 py-3 rainbowButton text-white rounded-lg transition-all shadow-lg">
        Wild Magic Table
    </button>
    <button onclick="window.location.href='FAQ.html'" 
        class="px-6 py-3 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-colors">
        Dev Notes
    </button>            
</div>   
    </div>

    <!-- Dark Mode Toggle -->
    <button onclick="toggleDarkMode()"
            class="fixed bottom-5 right-5 px-3 py-2 rounded-lg shadow bg-gray-800 text-white dark:bg-gray-700 z-50 transition-colors duration-300">
        🌙
    </button>

    <script>
        function toggleDarkMode() {
            const root = document.documentElement;
            if (root.classList.contains("dark")) {
                root.classList.remove("dark");
                localStorage.setItem("theme", "light");
            } else {
                root.classList.add("dark");
                localStorage.setItem("theme", "dark");
            }
        }
    </script>
</body>
<style>
.rainbowButton{
  background: linear-gradient(
    90deg,
    red,
    orange,
    #FACC15, /* darker yellow for better contrast */
    green,
    blue,
    indigo,
    violet,
    red
  );
  background-size: 200% 100%;
  animation: rainbowMove 4s linear infinite;
  color: white;
}

.rainbowButton:hover{
  filter: brightness(1.15);
}

@keyframes rainbowMove{
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
</style>

</html>
